name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync

      - name: Clone ERC-7730 registry (for tests that need it)
        run: git clone --depth 1 https://github.com/ethereum/clear-signing-erc7730-registry.git

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

      - name: Tests
        run: uv run pytest -q

      - name: Supply-chain audit
        run: uvx pip-audit --strict
