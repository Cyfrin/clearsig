name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync

      - name: Clone ERC-7730 registry (for tests that need it)
        run: git clone --depth 1 https://github.com/ethereum/clear-signing-erc7730-registry.git

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

      - name: Tests
        run: uv run pytest -q

      - name: Supply-chain audit
        run: uvx pip-audit --strict

      - name: Workflow security audit
        run: uvx zizmor --persona=auditor --min-severity=medium .github/workflows/
